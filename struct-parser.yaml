# Struct Parser 配置文件
# 程序将从 compileConfigFile 中提取编译命令并扫描头文件

# 必需：编译配置文件路径
# 支持以下格式：
# 1. compile_commands.json (JSON Compilation Database)
# 2. Makefile (提取 CFLAGS/CPPFLAGS)
# 3. 直接命令文件 (包含完整的 gcc 命令和参数)
compileConfigFile: ./src/main/resources/include/command.txt

# 可选：输出配置
output:
  # 输出格式：目前仅支持 json
  format: json
  
  # 输出文件路径
  # 如果不指定，将输出到标准输出 (stdout)
  outputFile: output/structs.json

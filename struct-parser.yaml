# Struct Parser 配置文件
# 程序将扫描 includePaths 中的头文件(.h, .hpp, .hh, .hxx)

# 必需：头文件搜索路径列表
# 每个路径将被扫描，该目录下的头文件会被解析（不递归子目录）
includePaths:
  - ./src/main/resources/include

# 可选：GCC 命令
# 默认使用系统 gcc，可以指定交叉编译器如 arm-none-eabi-gcc
gccCommand: gcc

# 必需：强制使用 GCC 预处理
# 必须为 true，确保解析前进行标准 C 预处理
gccRequired: true

# 可选：输出配置
output:
  # 输出格式：目前仅支持 json
  format: json
  
  # 输出文件路径
  # 如果不指定，将输出到标准输出 (stdout)
  outputFile: output/structs.json

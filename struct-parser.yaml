# Struct Parser 配置文件
# 程序将从 compileConfigFile 中提取编译命令并扫描头文件

# 必需：编译配置文件路径
# 仅支持直接命令文件格式（类C DSL场景）
# 示例内容: gcc -E -P -I./include -I./drivers
compileConfigFile: ./src/main/resources/include/command.txt

# 可选：输出配置
output:
  # 输出格式：目前仅支持 json
  format: json
  
  # 输出文件路径
  # 如果不指定，将输出到标准输出 (stdout)
  outputFile: output/structs.json

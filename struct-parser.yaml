# Struct Parser 配置文件
# 程序将递归扫描 includePaths 中的所有头文件(.h, .hpp, .hh, .hxx)

# 必需：头文件搜索路径列表
# 每个路径将被递归扫描，所有子目录中的头文件都会被解析
includePaths:
  - ./include
  - ./drivers
  - ./hal

# 可选：GCC 命令
# 默认使用系统 gcc，可以指定交叉编译器如 arm-none-eabi-gcc
gccCommand: gcc

# 必需：强制使用 GCC 预处理
# 必须为 true，确保解析前进行标准 C 预处理
gccRequired: true

# 可选：输出配置
output:
  # 输出格式：目前仅支持 json
  format: json
  
  # 输出文件路径
  # 如果不指定，将输出到标准输出 (stdout)
  # outputFile: output/structs.json
